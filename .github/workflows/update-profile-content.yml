name: Update portfolio profile content

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-profile-content.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
