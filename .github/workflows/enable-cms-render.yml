name: Enable CMS renderer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/enable-cms-render.yml'
      - 'assets/cms-render.js'
      - 'assets/cms-pages.js'
      - 'assets/extra-admin.js'
      - 'assets/extra-cms-render.js'

permissions:
  contents: write

jobs:
  patch-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Insert CMS scripts
        run: |
          python <<'PY'
          from pathlib import Path
          changed = False

          def insert_before_body(file_name, marker, script):
              global changed
              path = Path(file_name)
              if not path.exists():
                  return
              html = path.read_text(encoding='utf-8')
              if marker not in html:
                  html = html.replace('</body>', script + '</body>')
                  path.write_text(html, encoding='utf-8')
                  changed = True
                  print('patched', file_name)
              else:
                  print('already patched', file_name)

          insert_before_body('index.html', 'assets/cms-render.js', '  <script type="module" src="assets/cms-render.js"></script>\n')
          insert_before_body('index.html', 'assets/extra-cms-render.js', '  <script type="module" src="assets/extra-cms-render.js"></script>\n')
          insert_before_body('admin.html', 'assets/extra-admin.js', '  <script type="module" src="assets/extra-admin.js"></script>\n')

          slider_marker = 'setupSlider(listSelector, itemSelector, prevId, nextId, countId)'
          slider_script = '''  <script>
            window.addEventListener('load', function () {
              function setupSlider(listSelector, itemSelector, prevId, nextId, countId) {
                const list = document.querySelector(listSelector);
                const prev = document.getElementById(prevId);
                const next = document.getElementById(nextId);
                const count = document.getElementById(countId);
                if (!list) return;
                let index = 0;
                function slides() { return Array.from(document.querySelectorAll(listSelector + ' ' + itemSelector)); }
                function show(n) {
                  const all = slides();
                  if (!all.length) return;
                  index = (n + all.length) % all.length;
                  all.forEach(function (slide, i) { slide.classList.toggle('active', i === index); });
                  if (count) count.textContent = (index + 1) + ' / ' + all.length;
                }
                if (prev) prev.onclick = function (e) { e.preventDefault(); show(index - 1); };
                if (next) next.onclick = function (e) { e.preventDefault(); show(index + 1); };
                show(0);
              }
              setTimeout(function () {
                setupSlider('.news-list', '.news-item', 'newsPrev', 'newsNext', 'newsCount');
                setupSlider('.cert-grid', '.cert-card', 'certPrev', 'certNext', 'certCount');
              }, 1800);
            });
          </script>
          '''
          insert_before_body('index.html', slider_marker, slider_script)

          pages_script = '  <script type="module" src="assets/cms-pages.js"></script>\n'
          insert_before_body('news.html', 'assets/cms-pages.js', pages_script)
          insert_before_body('certificates.html', 'assets/cms-pages.js', pages_script)

          if not changed:
              print('No page changes')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add index.html admin.html news.html certificates.html
            git commit -m "Connect extended CMS editors"
            git push
          fi
